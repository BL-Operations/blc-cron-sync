name: Campaign Group Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: campaign-group-sync
  cancel-in-progress: false

jobs:
  sync-campaign-groups:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install postgres

      - name: Run sync script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SALESFORCE_OAUTH_CLIENT_ID: ${{ secrets.SALESFORCE_OAUTH_CLIENT_ID }}
          SALESFORCE_OAUTH_CLIENT_SECRET: ${{ secrets.SALESFORCE_OAUTH_CLIENT_SECRET }}
          SALESFORCE_OAUTH_TOKEN_URL: ${{ secrets.SALESFORCE_OAUTH_TOKEN_URL }}
        run: node scripts/campaign-group-sync.mjs

      - name: Send failure notification
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "BL Connect <notifications@buyerlink.com>",
              "to": ["zapops@buyerlink.com", "jonathan.borgia@buyerlink.com"],
              "subject": "⚠️ GitHub Action Failed: ${{ github.workflow }}",
              "html": "<p>The <strong>${{ github.workflow }}</strong> workflow failed.</p><p><strong>Run:</strong> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">${{ github.run_id }}</a></p><p><strong>Time:</strong> ${{ github.event.head_commit.timestamp || github.event.schedule }}</p>"
            }'
