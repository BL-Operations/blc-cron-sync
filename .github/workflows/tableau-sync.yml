name: Tableau Sync

on:
  schedule:
    # 7:00 AM MDT = 13:00 UTC (MDT is UTC-6)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Adjust based on how long your sync takes

    steps:
      - name: Trigger Tableau Sync
        id: sync
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.TABLEAU_SYNC_API_KEY }}" \
            -H "Accept: application/x-ndjson" \
            --max-time 600 \
            "https://buyerlink-connect.floot.app/_api/tableau-raw-data/process"
# Re-register
      - name: Send failure notification
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "BL Connect <notifications@buyerlink.com>",
              "to": ["zapops@buyerlink.com", "jonathan.borgia@buyerlink.com"],
              "subject": "⚠️ GitHub Action Failed: ${{ github.workflow }}",
              "html": "<p>The <strong>${{ github.workflow }}</strong> workflow failed.</p><p><strong>Run:</strong> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">${{ github.run_id }}</a></p><p><strong>Time:</strong> ${{ github.event.head_commit.timestamp || github.event.schedule }}</p>"
            }'
