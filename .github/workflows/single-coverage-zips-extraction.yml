name: Single Coverage Zips Extraction

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Trigger Single Coverage Zips Extraction
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.EXTRACTION_API_KEY }}" \
            -H "X-Tableau-View-ID: ${{ secrets.TABLEAU_VIEW_ID }}" \
            -H "Accept: application/x-ndjson" \
            --max-time 540 \
            --no-buffer \
            "https://buyerlink-connect.floot.app/_api/single-coverage-zips/extract"
# Re-register
      - name: Send failure notification
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "BL Connect <notifications@buyerlink.com>",
              "to": ["zapops@buyerlink.com", "jonathan.borgia@buyerlink.com"],
              "subject": "⚠️ GitHub Action Failed: ${{ github.workflow }}",
              "html": "<p>The <strong>${{ github.workflow }}</strong> workflow failed.</p><p><strong>Run:</strong> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">${{ github.run_id }}</a></p><p><strong>Time:</strong> ${{ github.event.head_commit.timestamp || github.event.schedule }}</p>"
            }'
